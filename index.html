<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hafis Aesthetic Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap');

        /* --- [สไตล์พื้นฐานเดิมของคุณ] --- */
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(10px) brightness(0.4);
            transform: scale(1.1);
            z-index: -1;
        }

        /* 1. ตัวคุมหน้าจอภาพรวม (ปล่อยให้ทำหน้าที่เป็นพื้นหลังอย่างเดียว) */
        .container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 40px 0 140px 0;
            /* เว้นพื้นที่ด้านล่างเผื่อให้เครื่องเล่นเพลง */
            box-sizing: border-box;
        }

        /* 2. 🌟 ตัวกล่องครอบโปรไฟล์หลัก (สร้างกล่องมืดสลัวครอบทุกอย่างตามแบบ guns.lol) */
        /* 1. 🌟 ตัวกล่องหลัก: ขยายเป็นแนวนอนกว้าง และขอบมนโค้งมากพิเศษแบบรูปต้นฉบับ */
        #main-page,
        .page-active {
            position: relative;
            width: 620px;
            /* ขยายความกว้างแนวนอนให้กว้างสะใจแบบ ztmv */
            background: rgba(20, 20, 20, 0.45) !important;
            /* สีดำสลัวโปร่งแสงกำลังดี */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            /* เส้นขอบบางเฉียบเคลือบเงา */
            border-radius: 35px;
            /* 🌟 จุดสำคัญ: เพิ่มความโค้งมนให้มนกลมละมุนแบบในรูป */
            padding: 40px 35px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: auto;
            box-sizing: border-box;
            overflow: visible;
            /* 🌟 เพิ่ม 3 บรรทัดนี้ต่อท้ายเข้าไปด้านในคลาสครับ */
            transform-style: preserve-3d;
            perspective: 1000px;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        /* 2. จัดโครงสร้างเนื้อหาแถวบน (ถอดแบบแถวชื่อ ztmv) */
        .profile-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
            margin-bottom: 10px;
        }

        /* 3. รูปโปรไฟล์: ปรับทรงมนกลมให้เข้ากับธีมเว็บ */
        .profile-img {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* 4. จัดระเบียบปุ่ม Discord ยาวสีมืด (ถอดแบบปุ่ม ztmvc ด้านใน) */
        .lol-link-btn {
            width: 100%;
            background: rgba(30, 30, 30, 0.4) !important;
            /* ปรับสีปุ่มด้านในให้กลืนกับกล่องใหญ่ */
            color: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 18px 24px;
            /* เพิ่มพื้นที่ความหนาให้ปุ่มดูนุ่มนวล */
            border-radius: 20px;
            /* 🌟 ปรับความโค้งมนของปุ่มด้านในให้มนสวยเข้าคู่กับกล่องนอก */
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-decoration: none;
            display: flex;
            justify-content: flex-start;
            /* จัดไอคอนดิสคอร์ดให้อยู่ฝั่งซ้ายแบบต้นฉบับ */
            align-items: center;
            gap: 15px;
            box-sizing: border-box;
            transition: all 0.25s ease;
        }

        .lol-link-btn:hover {
            background: rgba(40, 40, 40, 0.6) !important;
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-1px);
        }


        @keyframes floating {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        /* --- [ระบบการเลื่อนหน้า Slide Up/Down] --- */
        .page {
            position: absolute;
            width: 100%;
            opacity: 0;
            visibility: hidden;
            transition: all 0.8s cubic-bezier(0.65, 0, 0.35, 1);
            pointer-events: none;
        }

        .page.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            z-index: 10;
        }

        .page.exit-up {
            transform: translateY(-100vh);
            opacity: 0;
        }

        .page.exit-down {
            transform: translateY(100vh);
            opacity: 0;
        }

        .page.enter-bottom {
            transform: translateY(100vh);
        }

        .page.enter-top {
            transform: translateY(-100vh);
        }

        /* --- [Profile Section เดิม] --- */
        .profile-wrapper {
            position: relative;
            display: inline-block;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            margin-bottom: 15px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .profile-img:hover {
            transform: scale(1.15) rotate(5deg);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        /* --- [Education Logo Wrapper - ใหม่ตามคำขอ] --- */
        .edu-logo-wrapper {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            margin: 0 auto 15px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }

        .edu-logo-wrapper:hover {
            transform: scale(1.15) rotate(-5deg);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .tabs {
            display: flex;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            margin-bottom: 20px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            transition: 0.4s;
            font-family: "Pixelify Sans", sans-serif;
            text-transform: uppercase;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .content-wrapper {
            height: 220px;
            position: relative;
        }

        .pane {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            opacity: 0;
            transform: translateY(20px);
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pane.active {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }

        .info-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin-bottom: 12px;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }

        .info-box:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(5px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .social-icon {
            width: 45px;
            height: 45px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-decoration: none;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255, 255, 255, 0.05);
        }

        .social-icon:hover {
            background: white;
            color: black;
            transform: translateY(-5px);
        }

        /* --- [Education Layout & Timeline รายละเอียดครบ] --- */
        .timeline-container {
            position: relative;
            width: 100%;
            margin-top: 20px;
        }

        .timeline-container::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-50%);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .timeline-item {
            display: flex;
            width: 100%;
            margin-bottom: 30px;
            position: relative;
            align-items: center;
        }

        .dot {
            position: absolute;
            left: 50%;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 10px #fff;
            z-index: 5;
            transition: 0.4s;
        }

        .edu-card {
            width: 45%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
        }

        .timeline-item.right {
            justify-content: flex-end;
        }

        .timeline-item.left {
            justify-content: flex-start;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
                filter: blur(5px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
                filter: blur(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
                filter: blur(5px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
                filter: blur(0);
            }
        }

        #edu-page.active .timeline-item.left .edu-card {
            animation: slideInLeft 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }

        #edu-page.active .timeline-item.right .edu-card {
            animation: slideInRight 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }

        #edu-page.active .timeline-item:nth-child(1) .edu-card {
            animation-delay: 0.2s;
        }

        #edu-page.active .timeline-item:nth-child(2) .edu-card {
            animation-delay: 0.4s;
        }

        #edu-page.active .timeline-item:nth-child(3) .edu-card {
            animation-delay: 0.6s;
        }

        .edu-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .timeline-item:hover .dot {
            box-shadow: 0 0 20px #fff, 0 0 40px #fff;
            transform: translateX(-50%) scale(1.5);
        }

        /* --- [Loader] --- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s;
        }

        .dino {
            font-size: 35px;
            position: absolute;
            bottom: 45px;
            left: 0;
            animation: jump 0.6s infinite alternate;
        }

        @keyframes jump {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-15px);
            }
        }

        .progress-bar {
            width: 250px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #fff;
            box-shadow: 0 0 15px #fff;
            border-radius: 10px;
        }


        /* กล่องควบคุม: เปลี่ยนเป็นสีขาวจาง และล็อกความกว้างตอนเริ่มต้น */
        .volume-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            display: inline-flex;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.15);
            /* สีขาวจาง ๆ สไตล์กระจกฝ้า */
            padding: 10px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            transition: all 0.3s ease;
            /* แอนิเมชันตอนยืด-หด */
            width: 24px;
            /* กว้างพอดีแค่ไอคอนตอนเริ่มต้น */
        }

        /* ส่วนครอบสไลเดอร์: ซ่อนไว้ตอนแรก */
        .slider-wrapper {
            width: 0;
            overflow: hidden;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
        }

        /* เมื่อเอาเมาส์มาวาง (Hover): กล่องจะขยายออกและเว้นช่องไฟ */
        .volume-container:hover {
            width: 160px;
            /* ขยายความกว้างออก */
            padding-right: 16px;
            gap: 12px;
        }

        /* เมื่อ Hover: ให้แถบสไลด์แสดงความกว้างออกมา */
        .volume-container:hover .slider-wrapper {
            width: 100px;
        }

        /* ปุ่มไอคอนลำโพง */
        .volume-btn {
            background: none;
            border: none;
            color: #ffffff;
            /* ไอคอนสีขาว */
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* แถบเส้นปรับเสียง */
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.3);
            /* เส้นรางสีขาวใส */
            outline: none;
           
        }

        /* ปุ่มกลมสำหรับเลื่อน */
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffffff;
        }

        .volume-slider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffffff;
            border: none;
        }




        /* กล่องครอบเครื่องเล่นเพลงหลัก */
        .music-player-container {
            position: absolute;
            bottom: -100px;
            /* สั่งให้ดีดตัวลงไปอยู่ใต้ฐานล่างของการ์ดโปรไฟล์ */
            left: 50%;
            transform: translateX(-50%);
            /* จัดตำแหน่งให้อยู่กึ่งกลางพอดี */
            display: flex;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            gap: 16px;
            width: max-content;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }




        /* รูปไอคอนหน้าเพลง */
        .music-cover {
            width: 48px;
            height: 48px;
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }

        .music-cover svg {
            width: 26px;
            height: 26px;
        }

        /* ส่วนแสดงชื่อและเวลา */
        .music-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .music-title {
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 1px;
        }

        /* โครงสร้างแถบเวลา */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* แถบความคืบหน้า (ราง) */
        .progress-bar-bg {
            width: 220px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            position: relative;
        }

        /* เส้นสีขาวที่วิ่งตามเวลาเพลง */
        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background-color: #ffffff;
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        /* ส่วนปุ่มควบคุมการเล่น */
        .player-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .control-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, transform 0.1s;
        }

        .control-btn:hover {
            color: #ffffff;
        }

        .control-btn active {
            transform: scale(0.95);
        }

        .control-btn svg {
            width: 20px;
            height: 20px;
        }

        /* ปุ่มเล่น/หยุดให้มีขนาดเด่นขึ้นเล็กน้อย */
        .play-btn svg {
            width: 24px;
            height: 24px;
        }

        /* ใส่เอฟเฟกต์สั่นระริกให้กับตัวอักษร */
        .glitch-title {
            position: relative;
            display: inline-block;
            /* 🌟 ปลดล็อกพื้นที่ด้านข้างเพื่อให้ชื่อไปอยู่ข้างรูปได้ */
            width: auto;
            font-size: 2.8rem;
            /* ปรับขนาดให้สมดุลเวลานั่งข้างรูปโปรไฟล์ */
            font-weight: 800;
            letter-spacing: 2px;
            color: #ffffff !important;
            /* 🌟 เปลี่ยนตัวหนังสือเป็นสีขาวนีออนสนิท */
            text-align: left;
            margin: 0;

            /* เอฟเฟกต์เรืองแสงนีออนสีขาวรอบตัวอักษร */
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px rgba(255, 255, 255, 0.4);

            animation: glitch-skew 0.3s infinite linear alternate-reverse;
        }

        /* จัดระเบียบกล่องหลักให้ชิดซ้ายเพื่อรองรับชื่อนั่งข้างรูป */
        #main-page,
        .page-active {
            align-items: flex-start !important;
            padding: 40px 45px;
        }

        /* บังคับให้รูปโปรไฟล์และชื่อจัดแถวเรียงซ้ายไปขวาคู่กัน */
        .profile-wrapper {
            display: flex;
            align-items: center;
            justify-content: flex-start !important;
            gap: 25px;
            /* เว้นระยะห่างช่องไฟระหว่างรูปกับชื่อ */
            width: 100%;
            margin-bottom: 20px;
        }



        /* สร้างเลเยอร์เงาสีสะบัดซ้อนขยับยึกยักตลอดเวลา */
        .glitch-title::before,
        .glitch-title::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;

            edu.classList.add('exit-down');

            main.classList.add('enter-top');
            setTimeout(() => { main.classList.add('active'); main.classList.remove('enter-top'); }, 50);

    <!-- คัดลอกตั้งแต่บรรทัดนี้เป็นต้นไป นำไปวางต่อจากแท็ก <audio> -->
    <script>
        // 1. ระบบบังคับเล่นเพลงเมื่อคลิกหน้าจอครั้งแรก (Autoplay)
        document.addEventListener('click', function () {
            const audio = document.getElementById('bg-music');
            if (audio && audio.paused) {
                audio.play().catch(err => console.log("Autoplay บล็อก:", err));
            }
        }, { once: true });

        // 2. ระบบควบคุมระดับเสียงและปุ่มเปิด-ปิดเสียง
        // รอให้หน้าเว็บโหลดองค์ประกอบ HTML ครบก่อนทำงาน
        document.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('bg-music');
            const volumeSlider = document.getElementById('volume-slider');
            const muteBtn = document.getElementById('mute-btn');

            // ไอคอนลำโพงเปิด-ปิดเสียงแบบ SVG
            // ลบอันเก่าออกแล้วแทนที่ด้วย 2 บรรทัดนี้
            const iconSoundOn = `<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>`;
            const iconMuted = `<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><line x1="22" y1="9" x2="16" y2="15"></line><line x1="16" y1="9" x2="22" y2="15"></line></svg>`;


            // เช็คว่ามีปุ่มและแถบสไลด์ในหน้าเว็บจริงไหม ถ้ามีให้เริ่มทำงาน
            if (audio && volumeSlider && muteBtn) {
                // ตั้งระดับเสียงเริ่มต้นตามค่าของแถบสไลด์ (เช่น 0.5 คือ 50%)
                audio.volume = volumeSlider.value;

                // ฟังก์ชันเมื่อเลื่อนแถบสไลด์ปรับเสียง
                volumeSlider.addEventListener('input', (e) => {
                    const val = e.target.value;
                    audio.volume = val;

                    if (val == 0) {
                        audio.muted = true;
                        muteBtn.innerHTML = iconMuted;
                    } else {
                        audio.muted = false;
                        muteBtn.innerHTML = iconSoundOn;
                    }
                });

                // ฟังก์ชันเมื่อกดคลิกที่ปุ่มลำโพงเพื่อเปิด-ปิดเสียง (Mute)
                muteBtn.addEventListener('click', () => {
                    if (audio.muted) {
                        audio.muted = false;
                        audio.volume = 0.5;
                        volumeSlider.value = 0.5;
                        muteBtn.innerHTML = iconSoundOn;
                    } else {
                        audio.muted = true;
                        audio.volume = 0;
                        volumeSlider.value = 0;
                        muteBtn.innerHTML = iconMuted;
                    }
                });
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('bg-music');
            const playPauseBtn = document.getElementById('play-pause-btn');
            const playIcon = document.getElementById('play-icon');
            const prevBtn = document.getElementById('prev-btn');
            const progressFill = document.getElementById('progress-fill');
            const currentTimeEl = document.getElementById('current-time');
            const durationTimeEl = document.getElementById('duration-time');
            const progressBarClick = document.getElementById('progress-bar-click');

            // ไอคอนสำหรับสลับ เล่น / หยุด สไตล์มินิมอลแบบถมรูป
            const svgPlay = `<path d="M8 5v14l11-7z"/>`;
            const svgPause = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;

            // ฟังก์ชันแปลงวินาทีให้เป็นรูปแบบ นาที:วินาที (0:00)
            function formatTime(seconds) {
                if (isNaN(seconds)) return "0:00";
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }

            // อัปเดตเวลาและแถบเส้นวิ่งขณะเพลงเล่น
            if (audio) {
                audio.addEventListener('timeupdate', () => {
                    const currentTime = audio.currentTime;
                    const duration = audio.duration || 186; // ถ้าดึงค่าไม่ได้ ให้ใช้ค่าเริ่มต้น 3:06 (186 วินาที)

                    // คำนวณเปอร์เซ็นต์ให้แถบวิ่งขยับ
                    const progressPercent = (currentTime / duration) * 100;
                    progressFill.style.width = `${progressPercent}%`;

                    // แสดงเวลาปัจจุบัน
                    currentTimeEl.textContent = formatTime(currentTime);
                });

                // เมื่อเพลงเล่นจบ ให้รีเซ็ตกลับมาที่ 0:00 และเริ่มเล่นใหม่โดยอัตโนมัติเนื่องจากมี loop
                audio.addEventListener('ended', () => {
                    audio.currentTime = 0;
                    progressFill.style.width = '0%';
                    currentTimeEl.textContent = "0:00";
                });

                // สลับไอคอนปุ่มตามสถานะของเพลง (ป้องกันไอคอนค้างตอนเล่น Autoplay บล็อก)
                audio.addEventListener('play', () => {
                    playIcon.innerHTML = svgPause;
                });
                audio.addEventListener('pause', () => {
                    playIcon.innerHTML = svgPlay;
                });
            }

            // ฟังก์ชันเมื่อคลิกปุ่ม เล่น / หยุด
            playPauseBtn.addEventListener('click', () => {
                if (!audio) return;
                if (audio.paused) {
                    audio.play();
                } else {
                    audio.pause();
                }
            });

            // ปุ่มย้อนกลับ: กดแล้วจะย้อนเพลงกลับไปเริ่มที่วินาทีที่ 0 ทันที
            prevBtn.addEventListener('click', () => {
                if (!audio) return;
                audio.currentTime = 0;
                if (audio.paused) {
                    audio.play();
                }
            });

            // ระบบคลิกบนแถบความคืบหน้า เพื่อกดข้ามเวลาเพลง (Seekable)
            progressBarClick.addEventListener('click', (e) => {
                if (!audio) return;
                const rect = progressBarClick.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const width = rect.width;
                const duration = audio.duration || 186;

                audio.currentTime = (clickX / width) * duration;
            });
        });

        // 🌟 โค้ดระบบ 3D Tilt Effect เอียงกล่องตามเมาส์สไตล์ guns.lol 🌟
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('#main-page');

            if (card) {
                // เมื่อเมาส์ขยับอยู่บนตัวกล่อง
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();

                    // คำนวณหาจุดกึ่งกลางของกล่องโปรไฟล์
                    const x = e.clientX - rect.left - (rect.width / 2);
                    const y = e.clientY - rect.top - (rect.height / 2);

                    // ปรับตัวเลขหารด้านล่างนี้ได้ (เลขยิ่งน้อย กล่องจะยิ่งเอียงแรงสะใจขึ้น)
                    const rotateX = (y / 15);
                    const rotateY = -(x / 20);

                    // สั่งคำสั่งเอียงมิติ 3D และดึงกล่องลอยนูนขึ้นมาหาเมาส์
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                    card.style.boxShadow = `${-rotateY * 2}px ${rotateX * 2}px 40px rgba(0, 0, 0, 0.6)`;
                });

                // เมื่อเอาเมาส์ออกจากตัวกล่อง ให้กล่องเด้งกลับมาตั้งตรงนิ่งๆ เหมือนเดิมอัตโนมัติ
                card.addEventListener('mouseleave', () => {
                    card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                    card.style.boxShadow = `0 30px 60px rgba(0, 0, 0, 0.6)`;
                });
            }
        });


    </script>


    <!-- แถบควบคุมเสียงสไตล์มินิมอล -->
    <div class="volume-container">
        <button id="mute-btn" class="volume-btn">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
        </button>
        <div class="slider-wrapper">
            <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>




</body>

</html>
